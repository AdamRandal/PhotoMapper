<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="dashboard-page">
<nav class="navbar">
    <div class="nav-left">
        <a href="/dashboard" class="logo-link">
            <img src="{{ url_for('static', filename='camera-icon.png') }}" class="nav-logo">
        </a>
    </div>
    <div class="nav-center">
        <a href="/upload">Upload Image</a>
        <a href="/timeline/select">Timeline</a>
    </div>
    <div class="nav-right">
        <a href="/logout" class="lock-btn">
            <img src="{{ url_for('static', filename='lock.png') }}" class="lock-logo">
        </a>
    </div>
</nav>
<div class="container">
    <div class="table-wrapper">
        <table id="photoTable" style="width:100%">
            <tr>
                <th onclick="sortTable(0)">Photo Name</th>
                <th>Photo</th>
                <th onclick="sortTable(2, true)">Date & Time Uploaded</th>
                <th onclick="sortTable(3, true)">Date & Time Taken</th>
            </tr>
            {% for p in photos %}
            <tr onclick="window.location='/output/{{ p['name'] }}'" style="cursor:pointer;">
                <td>{{ p["name"] }}</td>
                <td>
                    <img src="{{ p['filepath'].replace('\\', '/') }}" height="100">
                </td>
                <td>{{ p["upload_datetime"] }}</td>
                <td>{{ p["taken_datetime"] }}</td>
            </tr>
            {% endfor %}
        </table>
    </div><br>
</div>
<script>
document.addEventListener("DOMContentLoaded", function () {
    let sortDirections = {0: 'asc', 2: 'asc', 3: 'asc'};
function parseCustomDate(dateStr) {
    if (!dateStr || dateStr === "None") {
        return null; // mark as missing
    }
    // EXIF format: YYYY:MM:DD HH:MM:SS
    if (dateStr.includes(":") && dateStr.split(" ")[0].split(":").length === 3) {
        const [datePart, timePart] = dateStr.split(" ");
        const [year, month, day] = datePart.split(":");
        return new Date(`${year}-${month}-${day}T${timePart}`);
    }
    // DD/MM/YYYY HH:MM:SS
    if (dateStr.includes("/")) {
        const [datePart, timePart] = dateStr.split(" ");
        const [day, month, year] = datePart.split("/");
        return new Date(`${year}-${month}-${day}T${timePart}`);
    }
    return new Date(dateStr);
}
    window.sortTable = function(colIndex, isDate=false) {
        const table = document.getElementById("photoTable");
        if (!table) return;
        const rowsArray = Array.from(table.rows).slice(1);
        const direction = sortDirections[colIndex] === 'asc' ? 1 : -1;
    rowsArray.sort((rowA, rowB) => {
    let a = rowA.cells[colIndex].innerText.trim();
    let b = rowB.cells[colIndex].innerText.trim();
    if (isDate) {
        a = parseCustomDate(a);
        b = parseCustomDate(b);
        if (a === null && b === null) return 0;
        if (a === null) return -1 * direction;
        if (b === null) return 1 * direction;
    } else {
        a = a.toLowerCase();
        b = b.toLowerCase();
    }
    if (a > b) return 1 * direction;
    if (a < b) return -1 * direction;
    return 0;
});
        rowsArray.forEach(row => table.tBodies[0].appendChild(row));
        sortDirections[colIndex] = sortDirections[colIndex] === 'asc' ? 'desc' : 'asc';
    };
});
</script>
</body>
</html>
